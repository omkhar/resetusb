name: Release Dispatch

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-dispatch-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dispatch-release:
    name: dispatch-release
    runs-on: ubuntu-latest
    permissions:
      actions: write # Dispatch the trusted release workflow on main.
      contents: read # Read the triggering tag metadata.
    steps:
      - name: Validate semver release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release dispatch requires a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
      - name: Dispatch trusted release workflow on main
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh workflow run release.yml \
            --repo "${REPOSITORY}" \
            --ref main \
            -f release_tag="${RELEASE_TAG}"
