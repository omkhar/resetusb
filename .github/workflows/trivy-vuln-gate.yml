name: Trivy Vulnerability Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-vuln-gate:
    name: trivy-vuln-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Build release builder image
        run: docker build -f docker/release-builder.Dockerfile -t resetusb-release-builder:trivy .

      - name: Run Trivy filesystem vulnerability gate (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Run Trivy release-builder image gate (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: resetusb-release-builder:trivy
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
