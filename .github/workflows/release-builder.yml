name: Release Builder

on:
  workflow_call:
    inputs:
      builder_sha:
        description: Immutable commit SHA for the builder workflow and assets.
        required: true
        type: string
      release_tag:
        description: Signed semver tag being built.
        required: true
        type: string
      source_ref:
        description: Git ref for the signed source tag to build.
        required: true
        type: string
      source_digest:
        description: Immutable commit digest resolved from the signed source tag.
        required: true
        type: string
    outputs:
      primary_artifacts:
        description: JSON list of primary release artifacts.
        value: ${{ jobs.release-build.outputs.primary_artifacts }}

permissions: {}

jobs:
  release-build:
    name: release-build
    runs-on: ubuntu-latest
    outputs:
      primary_artifacts: ${{ steps.manifest.outputs.primary_artifacts }}
    permissions:
      contents: read # Check out builder inputs and tagged release source.
      id-token: write # Sign release artifacts with keyless Sigstore identity.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.builder_sha }}
          fetch-depth: 0
          path: builder
          persist-credentials: false
      - name: Verify pinned builder workflow revision
        env:
          EXPECTED_WORKFLOW_SHA: ${{ inputs.builder_sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail

          if [[ ! "${EXPECTED_WORKFLOW_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Builder SHA must be an immutable commit digest" >&2
            exit 1
          fi

          if [[ "${WORKFLOW_SHA}" != "${EXPECTED_WORKFLOW_SHA}" ]]; then
            echo "Reusable builder workflow resolved to ${WORKFLOW_SHA}, expected ${EXPECTED_WORKFLOW_SHA}" >&2
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Verify source digest matches signed tag
        env:
          SOURCE_DIGEST: ${{ inputs.source_digest }}
        run: |
          set -euo pipefail
          checked_out_sha="$(git -C source rev-parse HEAD)"

          if [[ ! "${SOURCE_DIGEST}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Source digest must be an immutable commit digest" >&2
            exit 1
          fi

          if [[ "${checked_out_sha}" != "${SOURCE_DIGEST}" ]]; then
            echo "Signed source tag resolved to ${checked_out_sha}, expected ${SOURCE_DIGEST}" >&2
            exit 1
          fi
      - name: Validate semver release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release runs require a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
      - name: Verify signed release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SIGNING_KEY_FPR: 90554248C4F7CC086BB745D0DA5A8E9F536C42FD
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          trap 'rm -rf "$GNUPGHOME"' EXIT

          actual_fpr=
          actual_fpr="$(
            gpg --batch --with-colons --show-keys builder/.github/keys/release-signing-key.asc |
              awk -F: '/^fpr:/ {print $10; exit}'
          )"

          if [[ "$actual_fpr" != "$RELEASE_SIGNING_KEY_FPR" ]]; then
            echo "Unexpected release signing key fingerprint: $actual_fpr" >&2
            exit 1
          fi

          gpg --batch --import builder/.github/keys/release-signing-key.asc
          printf '%s:6:\n' "$RELEASE_SIGNING_KEY_FPR" | \
            gpg --batch --import-ownertrust

          git -C source rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}" >/dev/null
          git -C source -c gpg.program=gpg verify-tag "$RELEASE_TAG"
      - name: Install cosign
        run: |
          set -euo pipefail
          version="v3.0.5"
          expected_sha256="db15cc99e6e4837daabab023742aaddc3841ce57f193d11b7c3e06c8003642b2"
          install_dir="${RUNNER_TEMP}/bin"

          mkdir -p "$install_dir"
          curl --fail --show-error --silent --location \
            --retry 6 --retry-all-errors --retry-delay 2 \
            "https://github.com/sigstore/cosign/releases/download/${version}/cosign-linux-amd64" \
            --output "${install_dir}/cosign"

          echo "${expected_sha256}  ${install_dir}/cosign" | sha256sum --check --strict
          chmod +x "${install_dir}/cosign"
          echo "${install_dir}" >> "$GITHUB_PATH"
          "${install_dir}/cosign" version
      - name: Build release builder image
        run: |
          builder/scripts/docker-build-release-builder.sh --platform=linux/amd64 \
            -f builder/docker/release-builder.Dockerfile \
            -t "resetusb-release-builder:${GITHUB_SHA}" \
            builder
      - name: Build release artifacts
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          source_git_sha="$(git -C source rev-parse HEAD)"
          source_date_epoch="$(git -C source log -1 --format=%ct HEAD)"
          [[ "${source_date_epoch}" =~ ^[0-9]+$ ]]

          docker run --rm --platform=linux/amd64 \
            -e GITHUB_SHA="${source_git_sha}" \
            -e GITHUB_REF_NAME="${RELEASE_TAG}" \
            -e GITHUB_REF_TYPE=tag \
            -e SOURCE_DATE_EPOCH="${source_date_epoch}" \
            -e SOURCE_ROOT=/source \
            -e DIST_DIR=/source/dist \
            -e WORK_DIR=/tmp/resetusb-build \
            -v "$PWD/builder":/builder:ro \
            -v "$PWD/source":/source \
            -w /source \
            "resetusb-release-builder:${GITHUB_SHA}" \
            bash -lc '/builder/scripts/build-release-artifacts.sh'
      - name: Normalize artifact ownership
        run: sudo chown -R "$(id -u):$(id -g)" source/dist
      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.42.3
      - name: Generate SPDX SBOMs
        env:
          SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [[ "${SYFT_CMD}" != /* || ! -x "${SYFT_CMD}" ]]; then
            echo "Unexpected syft command path: ${SYFT_CMD}" >&2
            exit 1
          fi

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sha256 || "$artifact" == *.sigstore.json || "$artifact" == *.spdx.json ]]; then
              continue
            fi

            "${SYFT_CMD}" "$artifact" \
              -o "spdx-json=${artifact}.spdx.json"
          done
      - name: Generate release manifest
        env:
          BUILDER_SHA: ${{ inputs.builder_sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_DIGEST: ${{ inputs.source_digest }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          def load_builder_lock(path: Path) -> dict[str, str]:
              values = {}
              for raw_line in path.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  key, sep, value = line.partition("=")
                  if not sep or not key or not value:
                      raise SystemExit(f"invalid builder lock entry: {raw_line}")
                  values[key] = value
              return values

          builder_lock = load_builder_lock(Path("builder/docker/release-builder.lock"))
          required_keys = {
              "DEBIAN_BASE_IMAGE",
              "DEBIAN_SNAPSHOT_URL",
              "DEBIAN_SNAPSHOT_TIMESTAMP",
              "DEBIAN_SNAPSHOT_INRELEASE_SHA256",
              "DEBIAN_SUITE",
          }
          missing_keys = sorted(required_keys.difference(builder_lock))
          if missing_keys:
              raise SystemExit(f"builder lock is missing: {', '.join(missing_keys)}")

          source_date_epoch = subprocess.check_output(
              ["git", "-C", "source", "log", "-1", "--format=%ct", "HEAD"],
              text=True,
          ).strip()
          if not source_date_epoch.isdigit():
              raise SystemExit(f"unexpected SOURCE_DATE_EPOCH: {source_date_epoch}")

          dist = Path("source/dist")
          primary_artifacts = {}

          for path in sorted(dist.iterdir()):
              if not path.is_file():
                  continue

              name = path.name
              if name.endswith(".sha256") or name.endswith(".sigstore.json") or name.endswith(".spdx.json") or name.endswith("-release-manifest.json"):
                  continue

              primary_artifacts[name] = {
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          if not primary_artifacts:
              raise SystemExit("no primary artifacts were built")

          manifest = {
              "format_version": 3,
              "release_tag": os.environ["RELEASE_TAG"],
              "source_digest": os.environ["SOURCE_DIGEST"],
              "builder_digest": os.environ["BUILDER_SHA"],
              "builder_workflow": f'https://github.com/{os.environ["GITHUB_REPOSITORY"]}/.github/workflows/release-builder.yml@refs/tags/{os.environ["RELEASE_TAG"]}',
              "reproducible_inputs": {
                  "source_date_epoch": int(source_date_epoch),
                  "builder_base_image": builder_lock["DEBIAN_BASE_IMAGE"],
                  "debian_snapshot_url": builder_lock["DEBIAN_SNAPSHOT_URL"],
                  "debian_snapshot_timestamp": builder_lock["DEBIAN_SNAPSHOT_TIMESTAMP"],
                  "debian_snapshot_inrelease_sha256": builder_lock["DEBIAN_SNAPSHOT_INRELEASE_SHA256"],
                  "debian_suite": builder_lock["DEBIAN_SUITE"],
              },
              "primary_artifacts": primary_artifacts,
          }

          manifest_path = dist / f'resetusb-{os.environ["RELEASE_TAG"]}-release-manifest.json'
          manifest_path.write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Validate release manifest
        env:
          BUILDER_SHA: ${{ inputs.builder_sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_DIGEST: ${{ inputs.source_digest }}
        run: |
          python3 builder/scripts/validate-release-manifest.py \
            --manifest "source/dist/resetusb-${RELEASE_TAG}-release-manifest.json" \
            --repository "${GITHUB_REPOSITORY}" \
            --release-tag "${RELEASE_TAG}" \
            --source-digest "${SOURCE_DIGEST}" \
            --builder-digest "${BUILDER_SHA}" \
            --dist-dir source/dist
      - name: Refresh release checksums
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -f source/dist/*.sha256

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sha256 ]]; then
              continue
            fi

            (
              cd source/dist
              sha256sum "$(basename "$artifact")" > "$(basename "$artifact").sha256"
            )
          done
      - name: Sign release artifacts with Sigstore
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sigstore.json ]]; then
              continue
            fi
            cosign sign-blob --bundle "${artifact}.sigstore.json" "$artifact"
          done
      - name: Verify Sigstore signatures
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          release_tag_regex="${RELEASE_TAG//./\\.}"
          identity_regex="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-builder\\.yml@refs/tags/${release_tag_regex}$"
          shopt -s nullglob

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sigstore.json ]]; then
              continue
            fi
            cosign verify-blob \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity-regexp "$identity_regex" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$artifact"
          done
      - name: Capture primary release artifacts
        id: manifest
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import os
          from pathlib import Path

          manifest_path = (
              Path("source/dist")
              / f'resetusb-{os.environ["RELEASE_TAG"]}-release-manifest.json'
          )
          if not manifest_path.is_file():
              raise SystemExit(f"missing release manifest: {manifest_path}")

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          primary = sorted(manifest["primary_artifacts"])

          print(f"primary_artifacts={json.dumps(primary)}")
          PY
      - name: Upload release staging artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-dist
          path: source/dist/
          if-no-files-found: error
          retention-days: 7

  release-attest:
    name: release-attest (${{ matrix.artifact }})
    needs: release-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.release-build.outputs.primary_artifacts) }}
    permissions:
      actions: read # Download staged workflow artifacts for attestation.
      artifact-metadata: write # Persist attestation subject metadata.
      attestations: write # Publish GitHub artifact attestations.
      contents: read # Read workflow metadata during verification.
      id-token: write # Mint OIDC certificates for artifact attestations.
    steps:
      - name: Download staged release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Validate artifact path
        id: artifact
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          set -euo pipefail

          if [[ ! "${ARTIFACT_NAME}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Unexpected artifact name: ${ARTIFACT_NAME}" >&2
            exit 1
          fi

          artifact_path="dist/${ARTIFACT_NAME}"
          sbom_path="${artifact_path}.spdx.json"

          test -f "${artifact_path}"
          test -f "${sbom_path}"

          {
            printf 'name=%s\n' "${ARTIFACT_NAME}"
            printf 'path=%s\n' "${artifact_path}"
            printf 'sbom_path=%s\n' "${sbom_path}"
          } >> "${GITHUB_OUTPUT}"
      - name: Generate GitHub provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          show-summary: false
          subject-path: ${{ steps.artifact.outputs.path }}
      - name: Generate GitHub SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          show-summary: false
          subject-path: ${{ steps.artifact.outputs.path }}
          sbom-path: ${{ steps.artifact.outputs.sbom_path }}
      - name: Verify GitHub provenance attestation
        env:
          ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
          BUILDER_SHA: ${{ inputs.builder_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          verify_args=(
            --repo "${GITHUB_REPOSITORY}"
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-builder.yml"
            --signer-digest "${BUILDER_SHA}"
          )

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${ARTIFACT_PATH}" "${verify_args[@]}"; then
              exit 0
            fi

            sleep $((attempt * 3))
          done

          exit 1
      - name: Verify GitHub SBOM attestation
        env:
          ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
          BUILDER_SHA: ${{ inputs.builder_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          verify_args=(
            --repo "${GITHUB_REPOSITORY}"
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-builder.yml"
            --signer-digest "${BUILDER_SHA}"
          )

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${ARTIFACT_PATH}" \
              "${verify_args[@]}" \
              --predicate-type "https://spdx.dev/Document/v2.3"; then
              exit 0
            fi

            sleep $((attempt * 3))
          done

          exit 1
