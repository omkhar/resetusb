name: Release Builder

on:
  workflow_call:
    inputs:
      builder_sha:
        description: Immutable commit SHA for the builder workflow and assets.
        required: true
        type: string
      release_tag:
        description: Signed semver tag being built.
        required: true
        type: string
      source_ref:
        description: Git ref for the signed source tag to build.
        required: true
        type: string
      verify_source_ref:
        description: Source ref to require during attestation verification.
        required: false
        default: ""
        type: string
    outputs:
      primary_artifacts:
        description: JSON list of primary release artifacts.
        value: ${{ jobs.release-build.outputs.primary_artifacts }}

permissions: {}

jobs:
  release-build:
    name: release-build
    runs-on: ubuntu-latest
    outputs:
      primary_artifacts: ${{ steps.manifest.outputs.primary_artifacts }}
    permissions:
      contents: read # Check out builder inputs and tagged release source.
      id-token: write # Sign release artifacts with keyless Sigstore identity.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.builder_sha }}
          fetch-depth: 0
          path: builder
          persist-credentials: false
      - name: Verify pinned builder workflow revision
        env:
          EXPECTED_WORKFLOW_SHA: ${{ inputs.builder_sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail

          if [[ ! "${EXPECTED_WORKFLOW_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Builder SHA must be an immutable commit digest" >&2
            exit 1
          fi

          if [[ "${WORKFLOW_SHA}" != "${EXPECTED_WORKFLOW_SHA}" ]]; then
            echo "Reusable builder workflow resolved to ${WORKFLOW_SHA}, expected ${EXPECTED_WORKFLOW_SHA}" >&2
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Validate semver release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release runs require a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
      - name: Verify signed release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SIGNING_KEY_FPR: 90554248C4F7CC086BB745D0DA5A8E9F536C42FD
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          trap 'rm -rf "$GNUPGHOME"' EXIT

          actual_fpr=
          actual_fpr="$(
            gpg --batch --with-colons --show-keys builder/.github/keys/release-signing-key.asc |
              awk -F: '/^fpr:/ {print $10; exit}'
          )"

          if [[ "$actual_fpr" != "$RELEASE_SIGNING_KEY_FPR" ]]; then
            echo "Unexpected release signing key fingerprint: $actual_fpr" >&2
            exit 1
          fi

          gpg --batch --import builder/.github/keys/release-signing-key.asc
          printf '%s:6:\n' "$RELEASE_SIGNING_KEY_FPR" | \
            gpg --batch --import-ownertrust

          git -C source rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}" >/dev/null
          git -C source -c gpg.program=gpg verify-tag "$RELEASE_TAG"
      - name: Install cosign
        run: |
          set -euo pipefail
          version="v3.0.2"
          expected_sha256="46dbdcb5467a3dfec2526923d0b3365e40c8d9dc00ec23d5aca3437449e8cbfd"
          user_agent="Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"
          install_dir="${RUNNER_TEMP}/bin"

          mkdir -p "$install_dir"
          curl --fail --show-error --silent --location \
            --retry 6 --retry-all-errors --retry-delay 2 \
            --user-agent "$user_agent" \
            "https://github.com/sigstore/cosign/releases/download/${version}/cosign-linux-amd64" \
            --output "${install_dir}/cosign"

          echo "${expected_sha256}  ${install_dir}/cosign" | sha256sum --check --strict
          chmod +x "${install_dir}/cosign"
          echo "${install_dir}" >> "$GITHUB_PATH"
          "${install_dir}/cosign" version
      - name: Build release builder image
        run: |
          docker build --platform=linux/amd64 \
            -f builder/docker/release-builder.Dockerfile \
            -t "resetusb-release-builder:${GITHUB_SHA}" \
            builder
      - name: Build release artifacts
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          source_git_sha="$(git -C source rev-parse HEAD)"

          docker run --rm --platform=linux/amd64 \
            -e GITHUB_SHA="${source_git_sha}" \
            -e GITHUB_REF_NAME="${RELEASE_TAG}" \
            -e GITHUB_REF_TYPE=tag \
            -e SOURCE_ROOT=/source \
            -e DIST_DIR=/source/dist \
            -v "$PWD/builder":/builder:ro \
            -v "$PWD/source":/source \
            -w /source \
            "resetusb-release-builder:${GITHUB_SHA}" \
            bash -lc '/builder/scripts/build-release-artifacts.sh'
      - name: Normalize artifact ownership
        run: sudo chown -R "$(id -u):$(id -g)" source/dist
      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.42.3
      - name: Generate SPDX SBOMs
        env:
          SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [[ "${SYFT_CMD}" != /* || ! -x "${SYFT_CMD}" ]]; then
            echo "Unexpected syft command path: ${SYFT_CMD}" >&2
            exit 1
          fi

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sha256 || "$artifact" == *.sigstore.json || "$artifact" == *.spdx.json ]]; then
              continue
            fi

            "${SYFT_CMD}" "$artifact" \
              -o "spdx-json=${artifact}.spdx.json"
          done
      - name: Refresh release checksums
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -f source/dist/*.sha256

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sha256 ]]; then
              continue
            fi

            (
              cd source/dist
              sha256sum "$(basename "$artifact")" > "$(basename "$artifact").sha256"
            )
          done
      - name: Sign release artifacts with Sigstore
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sigstore.json ]]; then
              continue
            fi
            cosign sign-blob --bundle "${artifact}.sigstore.json" "$artifact"
          done
      - name: Verify Sigstore signatures
        run: |
          set -euo pipefail
          identity_regex="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-builder\\.yml@refs/heads/main$"
          shopt -s nullglob

          for artifact in source/dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sigstore.json ]]; then
              continue
            fi
            cosign verify-blob \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity-regexp "$identity_regex" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$artifact"
          done
      - name: Capture primary release artifacts
        id: manifest
        run: |
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          primary = []
          for path in sorted(Path("source/dist").iterdir()):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".sha256") or name.endswith(".sigstore.json") or name.endswith(".spdx.json"):
                  continue
              if "/" in name or "\\" in name or not name.replace(".", "").replace("-", "").replace("_", "").isalnum():
                  raise SystemExit(f"unexpected artifact name: {name}")
              primary.append(name)

          print(f"primary_artifacts={json.dumps(primary)}")
          PY
      - name: Upload release staging artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-dist
          path: source/dist/
          if-no-files-found: error
          retention-days: 7

  release-attest:
    name: release-attest (${{ matrix.artifact }})
    needs: release-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.release-build.outputs.primary_artifacts) }}
    permissions:
      actions: read # Download staged workflow artifacts for attestation.
      artifact-metadata: write # Persist attestation subject metadata.
      attestations: write # Publish GitHub artifact attestations.
      contents: read # Read workflow metadata during verification.
      id-token: write # Mint OIDC certificates for artifact attestations.
    steps:
      - name: Download staged release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Validate artifact path
        id: artifact
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          set -euo pipefail

          if [[ ! "${ARTIFACT_NAME}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Unexpected artifact name: ${ARTIFACT_NAME}" >&2
            exit 1
          fi

          artifact_path="dist/${ARTIFACT_NAME}"
          sbom_path="${artifact_path}.spdx.json"

          test -f "${artifact_path}"
          test -f "${sbom_path}"

          printf 'name=%s\n' "${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"
          printf 'path=%s\n' "${artifact_path}" >> "${GITHUB_OUTPUT}"
          printf 'sbom_path=%s\n' "${sbom_path}" >> "${GITHUB_OUTPUT}"
      - name: Generate GitHub provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          show-summary: false
          subject-path: ${{ steps.artifact.outputs.path }}
      - name: Generate GitHub SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          show-summary: false
          subject-path: ${{ steps.artifact.outputs.path }}
          sbom-path: ${{ steps.artifact.outputs.sbom_path }}
      - name: Verify GitHub provenance attestation
        env:
          ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
          GH_TOKEN: ${{ github.token }}
          VERIFY_SOURCE_REF: ${{ inputs.verify_source_ref }}
        run: |
          set -euo pipefail
          verify_args=(
            --repo "${GITHUB_REPOSITORY}"
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-builder.yml"
          )

          if [[ -n "${VERIFY_SOURCE_REF}" ]]; then
            verify_args+=(--source-ref "${VERIFY_SOURCE_REF}")
          fi

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${ARTIFACT_PATH}" "${verify_args[@]}"; then
              exit 0
            fi

            sleep $((attempt * 3))
          done

          exit 1
      - name: Verify GitHub SBOM attestation
        env:
          ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
          GH_TOKEN: ${{ github.token }}
          VERIFY_SOURCE_REF: ${{ inputs.verify_source_ref }}
        run: |
          set -euo pipefail
          verify_args=(
            --repo "${GITHUB_REPOSITORY}"
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-builder.yml"
          )

          if [[ -n "${VERIFY_SOURCE_REF}" ]]; then
            verify_args+=(--source-ref "${VERIFY_SOURCE_REF}")
          fi

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${ARTIFACT_PATH}" \
              "${verify_args[@]}" \
              --predicate-type "https://spdx.dev/Document/v2.3"; then
              exit 0
            fi

            sleep $((attempt * 3))
          done

          exit 1
