name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: release-preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run release preflight
        run: ./scripts/release-preflight.sh

  release-build:
    name: release-build
    needs: release-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify signed release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SIGNING_KEY_FPR: 90554248C4F7CC086BB745D0DA5A8E9F536C42FD
        run: |
          set -euo pipefail
          export GNUPGHOME="$(mktemp -d)"
          trap 'rm -rf "$GNUPGHOME"' EXIT

          actual_fpr="$(
            gpg --batch --with-colons --show-keys .github/keys/release-signing-key.asc |
              awk -F: '/^fpr:/ {print $10; exit}'
          )"

          if [[ "$actual_fpr" != "$RELEASE_SIGNING_KEY_FPR" ]]; then
            echo "Unexpected release signing key fingerprint: $actual_fpr" >&2
            exit 1
          fi

          gpg --batch --import .github/keys/release-signing-key.asc
          printf '%s:6:\n' "$RELEASE_SIGNING_KEY_FPR" | \
            gpg --batch --import-ownertrust

          git rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}" >/dev/null
          git -c gpg.program=gpg verify-tag "$RELEASE_TAG"
      - name: Install cosign
        run: |
          set -euo pipefail
          version="v3.0.2"
          expected_sha256="46dbdcb5467a3dfec2526923d0b3365e40c8d9dc00ec23d5aca3437449e8cbfd"
          user_agent="Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"
          install_dir="${RUNNER_TEMP}/bin"

          mkdir -p "$install_dir"
          curl --fail --show-error --silent --location \
            --retry 6 --retry-all-errors --retry-delay 2 \
            --user-agent "$user_agent" \
            "https://github.com/sigstore/cosign/releases/download/${version}/cosign-linux-amd64" \
            --output "${install_dir}/cosign"

          echo "${expected_sha256}  ${install_dir}/cosign" | sha256sum --check --strict
          chmod +x "${install_dir}/cosign"
          echo "${install_dir}" >> "$GITHUB_PATH"
          "${install_dir}/cosign" version
      - name: Build release builder image
        run: docker build -f docker/release-builder.Dockerfile -t "resetusb-release-builder:${GITHUB_SHA}" .

      - name: Build, test, and package artifacts
        run: |
          docker run --rm \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD":/work \
            -w /work \
            "resetusb-release-builder:${GITHUB_SHA}" \
            bash -lc '
              set -euo pipefail
              expect_non_root_error() {
                local log_file="$1"
                shift
                set +e
                runuser -u nobody -- "$@" > /dev/null 2>"$log_file"
                rc=$?
                set -e
                if [[ $rc -eq 0 ]]; then
                  echo "Expected non-zero exit for non-root invocation: $*" >&2
                  exit 1
                fi
                grep -q "Must be root" "$log_file"
              }

              # Native amd64 build + tests + runtime validation.
              make clean
              make CC=gcc
              make CC=gcc test
              expect_non_root_error /tmp/resetusb-amd64.log ./resetusb

              # Raspberry Pi 64-bit target (arm64) build + emulated tests + runtime validation.
              make clean
              make CC=aarch64-linux-gnu-gcc resetusb-tests resetusb
              qemu-aarch64-static -L /usr/aarch64-linux-gnu ./resetusb-tests
              expect_non_root_error /tmp/resetusb-arm64.log qemu-aarch64-static -L /usr/aarch64-linux-gnu ./resetusb

              # Raspberry Pi 32-bit target (armv7/armhf) build + emulated tests + runtime validation.
              make clean
              make CC=arm-linux-gnueabihf-gcc resetusb-tests resetusb
              qemu-arm-static -L /usr/arm-linux-gnueabihf ./resetusb-tests
              expect_non_root_error /tmp/resetusb-armv7.log qemu-arm-static -L /usr/arm-linux-gnueabihf ./resetusb

              version="${GITHUB_REF_NAME}"
              rm -rf dist
              mkdir -p dist

              build_and_pack() {
                local arch="$1"
                local cc="$2"
                local stage_dir="dist/${version}-linux-${arch}"
                local archive="dist/resetusb-${version}-linux-${arch}.tar.gz"

                make clean
                make CC="$cc"

                rm -rf "$stage_dir"
                mkdir -p "$stage_dir"

                install -m 0755 resetusb "$stage_dir/resetusb"
                install -m 0644 README.md "$stage_dir/README.md"
                install -m 0644 LICENSE "$stage_dir/LICENSE"

                tar -C dist -czf "$archive" "${version}-linux-${arch}"
                sha256sum "$archive" > "${archive}.sha256"
              }

              build_and_pack amd64 gcc
              build_and_pack arm64 aarch64-linux-gnu-gcc
              build_and_pack armv7 arm-linux-gnueabihf-gcc

              chown -R "${HOST_UID}:${HOST_GID}" dist
            '
      - name: Sign release artifacts with Sigstore
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          shopt -s nullglob

          for archive in dist/resetusb-"${version}"-linux-*.tar.gz; do
            checksum="${archive}.sha256"
            cosign sign-blob --bundle "${archive}.bundle.json" "$archive"
            cosign sign-blob --bundle "${checksum}.bundle.json" "$checksum"
          done
      - name: Verify Sigstore signatures
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          identity_regex="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/release\\.yml@refs/tags/.*$"
          shopt -s nullglob

          for archive in dist/resetusb-"${version}"-linux-*.tar.gz; do
            checksum="${archive}.sha256"
            cosign verify-blob \
              --bundle "${archive}.bundle.json" \
              --certificate-identity-regexp "$identity_regex" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$archive"
            cosign verify-blob \
              --bundle "${checksum}.bundle.json" \
              --certificate-identity-regexp "$identity_regex" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$checksum"
          done
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          cat >"$notes_file" <<EOF
          Automated public release artifact.

          Files:
          - resetusb-${tag}-linux-amd64.tar.gz
          - resetusb-${tag}-linux-amd64.tar.gz.sha256
          - resetusb-${tag}-linux-arm64.tar.gz
          - resetusb-${tag}-linux-arm64.tar.gz.sha256
          - resetusb-${tag}-linux-armv7.tar.gz
          - resetusb-${tag}-linux-armv7.tar.gz.sha256
          - resetusb-${tag}-linux-amd64.tar.gz.bundle.json
          - resetusb-${tag}-linux-amd64.tar.gz.sha256.bundle.json
          - resetusb-${tag}-linux-arm64.tar.gz.bundle.json
          - resetusb-${tag}-linux-arm64.tar.gz.sha256.bundle.json
          - resetusb-${tag}-linux-armv7.tar.gz.bundle.json
          - resetusb-${tag}-linux-armv7.tar.gz.sha256.bundle.json
          EOF

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "resetusb ${tag}" --notes-file "$notes_file"
          fi

          upload_files=()
          for file in \
            dist/resetusb-"${tag}"-linux-*.tar.gz \
            dist/resetusb-"${tag}"-linux-*.tar.gz.sha256 \
            dist/resetusb-"${tag}"-linux-*.tar.gz.bundle.json \
            dist/resetusb-"${tag}"-linux-*.tar.gz.sha256.bundle.json; do
            upload_files+=("$file")
          done

          gh release upload "$tag" "${upload_files[@]}" --clobber
