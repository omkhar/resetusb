name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Signed semver tag to publish with the builder workflow
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ inputs.release_tag || github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release-context:
    name: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read # Inspect existing releases before building immutable tags.
    outputs:
      builder_sha: ${{ steps.resolve.outputs.builder_sha }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      source_digest: ${{ steps.resolve.outputs.source_digest }}
    steps:
      - id: resolve
        name: Resolve trusted release inputs
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          semver_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          if [[ "${REF_TYPE}" != "branch" || "${REF_NAME}" != "main" ]]; then
            echo "Trusted release runs must be dispatched from main" >&2
            exit 1
          fi

          release_tag="${INPUT_RELEASE_TAG}"

          if [[ ! "${release_tag}" =~ ${semver_regex} ]]; then
            echo "Release runs require a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          builder_sha="${WORKFLOW_SHA}"
          if [[ ! "${builder_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve the pinned builder SHA from the trusted main workflow" >&2
            exit 1
          fi

          source_digest="$(
            git ls-remote "https://github.com/${REPOSITORY}.git" "refs/tags/${release_tag}^{}" |
              awk 'NR == 1 {print $1}'
          )"
          if [[ ! "${source_digest}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve the signed release tag to an immutable commit digest" >&2
            exit 1
          fi

          release_exists=false
          release_is_draft=false
          if gh release view "${release_tag}" --repo "${REPOSITORY}" --json isDraft,assets >/dev/null 2>&1; then
            release_exists=true
            release_is_draft="$(
              gh release view "${release_tag}" --repo "${REPOSITORY}" --json isDraft -q '.isDraft'
            )"
          fi

          if [[ "${release_exists}" == true && "${release_is_draft}" != true ]]; then
            echo "Published release tags are immutable; cut a new patch version instead of reusing ${release_tag}" >&2
            exit 1
          fi

          printf 'builder_sha=%s\n' "${builder_sha}" >> "${GITHUB_OUTPUT}"
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"
          printf 'source_ref=refs/tags/%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"
          printf 'source_digest=%s\n' "${source_digest}" >> "${GITHUB_OUTPUT}"

  release-preflight:
    name: release-preflight
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read # Check out builder inputs and tagged release source.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-context.outputs.builder_sha }}
          fetch-depth: 0
          path: builder
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-context.outputs.source_ref }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Validate semver release tag
        env:
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release runs require a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
      - name: Verify signed release tag before preflight
        env:
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
          RELEASE_SIGNING_KEY_FPR: 90554248C4F7CC086BB745D0DA5A8E9F536C42FD
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          trap 'rm -rf "$GNUPGHOME"' EXIT

          actual_fpr="$(
            gpg --batch --with-colons --show-keys builder/.github/keys/release-signing-key.asc |
              awk -F: '/^fpr:/ {print $10; exit}'
          )"

          if [[ "${actual_fpr}" != "${RELEASE_SIGNING_KEY_FPR}" ]]; then
            echo "Unexpected release signing key fingerprint: ${actual_fpr}" >&2
            exit 1
          fi

          gpg --batch --import builder/.github/keys/release-signing-key.asc
          printf '%s:6:\n' "${RELEASE_SIGNING_KEY_FPR}" | \
            gpg --batch --import-ownertrust

          git -C source rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}" >/dev/null
          git -C source -c gpg.program=gpg verify-tag "${RELEASE_TAG}"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Run release preflight
        env:
          GITHUB_REF_NAME: ${{ needs.release-context.outputs.release_tag }}
          GITHUB_REF_TYPE: tag
        run: |
          set -euo pipefail

          BUILDER_ROOT="$PWD/builder" \
          SOURCE_ROOT="$PWD/source" \
          WORK_ROOT="$PWD/source" \
          DIST_DIR="$PWD/source/dist" \
          ./builder/scripts/release-preflight.sh

  release-build:
    name: release-build
    needs:
      - release-context
      - release-preflight
    permissions:
      actions: read # Allow the reusable workflow to download staged artifacts for attestation.
      artifact-metadata: write # Persist subject metadata for builder attestations.
      attestations: write # Publish GitHub attestations from the builder workflow.
      contents: read # Check out builder inputs and tagged release source.
      id-token: write # Mint OIDC identities for Sigstore and GitHub attestations.
    uses: ./.github/workflows/release-builder.yml
    with:
      builder_sha: ${{ needs.release-context.outputs.builder_sha }}
      release_tag: ${{ needs.release-context.outputs.release_tag }}
      source_ref: ${{ needs.release-context.outputs.source_ref }}
      source_digest: ${{ needs.release-context.outputs.source_digest }}

  release-publish:
    name: release-publish
    needs:
      - release-context
      - release-build
    runs-on: ubuntu-latest
    permissions:
      actions: read # Download staged workflow artifacts before publication.
      contents: write # Create and update the GitHub release with generated artifacts.
    steps:
      - name: Download staged release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Install cosign
        run: |
          set -euo pipefail
          version="v3.0.2"
          expected_sha256="46dbdcb5467a3dfec2526923d0b3365e40c8d9dc00ec23d5aca3437449e8cbfd"
          user_agent="Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"
          install_dir="${RUNNER_TEMP}/bin"

          mkdir -p "$install_dir"
          curl --fail --show-error --silent --location \
            --retry 6 --retry-all-errors --retry-delay 2 \
            --user-agent "$user_agent" \
            "https://github.com/sigstore/cosign/releases/download/${version}/cosign-linux-amd64" \
            --output "${install_dir}/cosign"

          echo "${expected_sha256}  ${install_dir}/cosign" | sha256sum --check --strict
          chmod +x "${install_dir}/cosign"
          echo "${install_dir}" >> "$GITHUB_PATH"
          "${install_dir}/cosign" version
      - name: Verify builder-signed release manifest
        env:
          BUILDER_SHA: ${{ needs.release-context.outputs.builder_sha }}
          PRIMARY_ARTIFACTS_JSON: ${{ needs.release-build.outputs.primary_artifacts }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
          SOURCE_DIGEST: ${{ needs.release-context.outputs.source_digest }}
        run: |
          set -euo pipefail
          manifest_path="dist/resetusb-${RELEASE_TAG}-release-manifest.json"
          bundle_path="${manifest_path}.sigstore.json"
          identity_regex="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-builder\\.yml@refs/heads/main$"

          test -f "${manifest_path}"
          test -f "${bundle_path}"

          cosign verify-blob \
            --bundle "${bundle_path}" \
            --certificate-identity-regexp "${identity_regex}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${manifest_path}"

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          manifest_path = Path(f'dist/resetusb-{os.environ["RELEASE_TAG"]}-release-manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          artifacts = json.loads(os.environ["PRIMARY_ARTIFACTS_JSON"])

          if manifest.get("release_tag") != os.environ["RELEASE_TAG"]:
              raise SystemExit("release manifest tag does not match the requested release tag")
          if manifest.get("source_digest") != os.environ["SOURCE_DIGEST"]:
              raise SystemExit("release manifest source digest does not match the signed tag commit")
          if manifest.get("builder_digest") != os.environ["BUILDER_SHA"]:
              raise SystemExit("release manifest builder digest does not match the trusted builder workflow")
          if manifest.get("builder_workflow") != f'https://github.com/{os.environ["GITHUB_REPOSITORY"]}/.github/workflows/release-builder.yml@refs/heads/main':
              raise SystemExit("release manifest builder workflow does not match the trusted builder identity")

          manifest_artifacts = manifest.get("primary_artifacts")
          if not isinstance(manifest_artifacts, dict):
              raise SystemExit("release manifest primary_artifacts must be a JSON object")
          if sorted(manifest_artifacts) != sorted(artifacts):
              raise SystemExit("release manifest artifacts do not match the staged primary artifacts")

          for artifact in artifacts:
              artifact_path = Path("dist") / artifact
              if not artifact_path.is_file():
                  raise SystemExit(f"missing staged artifact: {artifact_path}")

              artifact_metadata = manifest_artifacts[artifact]
              if not isinstance(artifact_metadata, dict):
                  raise SystemExit(f"release manifest entry for {artifact} must be a JSON object")

              expected_sha = artifact_metadata.get("sha256")
              actual_sha = hashlib.sha256(artifact_path.read_bytes()).hexdigest()
              if expected_sha != actual_sha:
                  raise SystemExit(f"release manifest digest mismatch for {artifact}")
          PY
      - name: Verify staged artifacts against the builder workflow
        env:
          GH_TOKEN: ${{ github.token }}
          BUILDER_SHA: ${{ needs.release-context.outputs.builder_sha }}
          PRIMARY_ARTIFACTS_JSON: ${{ needs.release-build.outputs.primary_artifacts }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess

          artifacts = json.loads(os.environ["PRIMARY_ARTIFACTS_JSON"])
          if not artifacts:
              raise SystemExit("no primary artifacts were staged for publication")

          signer_workflow = f'{os.environ["GITHUB_REPOSITORY"]}/.github/workflows/release-builder.yml'
          builder_sha = os.environ["BUILDER_SHA"]

          for artifact in artifacts:
              artifact_path = f"dist/{artifact}"
              if not os.path.isfile(artifact_path):
                  raise SystemExit(f"missing staged artifact: {artifact_path}")

              base_cmd = [
                  "gh",
                  "attestation",
                  "verify",
                  artifact_path,
                  "--repo",
                  os.environ["GITHUB_REPOSITORY"],
                  "--signer-workflow",
                  signer_workflow,
                  "--signer-digest",
                  builder_sha,
              ]

              subprocess.run(base_cmd, check=True)
              subprocess.run(
                  base_cmd + ["--predicate-type", "https://spdx.dev/Document/v2.3"],
                  check=True,
              )
          PY
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          notes_file="$(mktemp)"
          release_exists=false
          release_is_draft=false
          mapfile -t files < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)

          cat >"$notes_file" <<EOF
          Automated public release artifact built by the dedicated GitHub builder workflow.

          Source tag: ${tag}

          Files:
          EOF

          for file in "${files[@]}"; do
            printf -- '          - %s\n' "$file" >>"$notes_file"
          done

          if gh release view "$tag" --repo "${REPOSITORY}" --json isDraft >/dev/null 2>&1; then
            release_exists=true
            release_is_draft="$(gh release view "$tag" --repo "${REPOSITORY}" --json isDraft -q '.isDraft')"
          fi

          if [[ "${release_exists}" == true && "${release_is_draft}" != "true" ]]; then
            echo "Published release tags are immutable; refusing to overwrite assets for ${tag}" >&2
            exit 1
          fi

          if [[ "${release_exists}" != true ]]; then
            gh release create "$tag" --repo "${REPOSITORY}" --title "resetusb ${tag}" --notes-file "$notes_file" --draft
            release_is_draft=true
          else
            gh release edit "$tag" --repo "${REPOSITORY}" --title "resetusb ${tag}" --notes-file "$notes_file" --draft=true
          fi

          if [[ "${release_is_draft}" == "true" ]]; then
            mapfile -t existing_assets < <(
              gh release view "$tag" --repo "${REPOSITORY}" --json assets -q '.assets[].name'
            )

            for asset in "${existing_assets[@]}"; do
              gh release delete-asset "$tag" "$asset" --repo "${REPOSITORY}" --yes
            done
          fi

          gh release upload "$tag" dist/* --repo "${REPOSITORY}" --clobber

          if [[ "${release_is_draft}" == "true" ]]; then
            gh release edit "$tag" --repo "${REPOSITORY}" --draft=false
          fi
