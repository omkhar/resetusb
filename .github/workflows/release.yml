name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: release-preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read # Check out repository contents for release validation.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Run release preflight
        run: ./scripts/release-preflight.sh

  release-build:
    name: release-build
    needs: release-preflight
    runs-on: ubuntu-latest
    outputs:
      primary_artifacts: ${{ steps.manifest.outputs.primary_artifacts }}
    permissions:
      contents: read # Check out repository contents and verify the release tag.
      id-token: write # Sign release artifacts with keyless Sigstore identity.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify signed release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SIGNING_KEY_FPR: 90554248C4F7CC086BB745D0DA5A8E9F536C42FD
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          trap 'rm -rf "$GNUPGHOME"' EXIT

          actual_fpr=
          actual_fpr="$(
            gpg --batch --with-colons --show-keys .github/keys/release-signing-key.asc |
              awk -F: '/^fpr:/ {print $10; exit}'
          )"

          if [[ "$actual_fpr" != "$RELEASE_SIGNING_KEY_FPR" ]]; then
            echo "Unexpected release signing key fingerprint: $actual_fpr" >&2
            exit 1
          fi

          gpg --batch --import .github/keys/release-signing-key.asc
          printf '%s:6:\n' "$RELEASE_SIGNING_KEY_FPR" | \
            gpg --batch --import-ownertrust

          git rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}" >/dev/null
          git -c gpg.program=gpg verify-tag "$RELEASE_TAG"
      - name: Install cosign
        run: |
          set -euo pipefail
          version="v3.0.2"
          expected_sha256="46dbdcb5467a3dfec2526923d0b3365e40c8d9dc00ec23d5aca3437449e8cbfd"
          user_agent="Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"
          install_dir="${RUNNER_TEMP}/bin"

          mkdir -p "$install_dir"
          curl --fail --show-error --silent --location \
            --retry 6 --retry-all-errors --retry-delay 2 \
            --user-agent "$user_agent" \
            "https://github.com/sigstore/cosign/releases/download/${version}/cosign-linux-amd64" \
            --output "${install_dir}/cosign"

          echo "${expected_sha256}  ${install_dir}/cosign" | sha256sum --check --strict
          chmod +x "${install_dir}/cosign"
          echo "${install_dir}" >> "$GITHUB_PATH"
          "${install_dir}/cosign" version
      - name: Build release builder image
        run: docker build --platform=linux/amd64 -f docker/release-builder.Dockerfile -t "resetusb-release-builder:${GITHUB_SHA}" .

      - name: Build release artifacts
        run: |
          docker run --rm --platform=linux/amd64 \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e GITHUB_REF_TYPE="${GITHUB_REF_TYPE}" \
            -v "$PWD":/work \
            -w /work \
            "resetusb-release-builder:${GITHUB_SHA}" \
            bash -lc './scripts/build-release-artifacts.sh'
      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.42.3
      - name: Generate SPDX SBOMs
        run: |
          set -euo pipefail
          shopt -s nullglob

          for artifact in dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sha256 || "$artifact" == *.sigstore.json || "$artifact" == *.spdx.json ]]; then
              continue
            fi

            "${{ steps.syft.outputs.cmd }}" "$artifact" \
              -o "spdx-json=${artifact}.spdx.json"
          done
      - name: Refresh release checksums
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -f dist/*.sha256

          for artifact in dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sha256 ]]; then
              continue
            fi

            sha256sum "$artifact" > "${artifact}.sha256"
          done
      - name: Sign release artifacts with Sigstore
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob

          for artifact in dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sigstore.json ]]; then
              continue
            fi
            cosign sign-blob --bundle "${artifact}.sigstore.json" "$artifact"
          done
      - name: Verify Sigstore signatures
        run: |
          set -euo pipefail
          identity_regex="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/release\\.yml@refs/tags/.*$"
          shopt -s nullglob

          for artifact in dist/*; do
            if [[ ! -f "$artifact" || "$artifact" == *.sigstore.json ]]; then
              continue
            fi
            cosign verify-blob \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity-regexp "$identity_regex" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$artifact"
          done
      - name: Capture primary release artifacts
        id: manifest
        run: |
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          primary = []
          for path in sorted(Path("dist").iterdir()):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".sha256") or name.endswith(".sigstore.json") or name.endswith(".spdx.json"):
                  continue
              primary.append(name)

          print(f"primary_artifacts={json.dumps(primary)}")
          PY
      - name: Upload release staging artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release-attest:
    name: release-attest (${{ matrix.artifact }})
    needs: release-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.release-build.outputs.primary_artifacts) }}
    permissions:
      actions: read # Download staged workflow artifacts for attestation.
      artifact-metadata: write # Persist attestation subject metadata.
      attestations: write # Publish GitHub artifact attestations.
      contents: read # Read workflow metadata during verification.
      id-token: write # Mint OIDC certificates for artifact attestations.
    steps:
      - name: Download staged release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Verify paired SBOM exists
        run: |
          test -f "dist/${{ matrix.artifact }}.spdx.json"
      - name: Generate GitHub provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          show-summary: false
          subject-path: "dist/${{ matrix.artifact }}"
      - name: Generate GitHub SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          show-summary: false
          subject-path: "dist/${{ matrix.artifact }}"
          sbom-path: "dist/${{ matrix.artifact }}.spdx.json"
      - name: Verify GitHub provenance attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "dist/${{ matrix.artifact }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --source-ref "refs/tags/${GITHUB_REF_NAME}"; then
              exit 0
            fi

            sleep $((attempt * 3))
          done

          exit 1
      - name: Verify GitHub SBOM attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "dist/${{ matrix.artifact }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --source-ref "refs/tags/${GITHUB_REF_NAME}" \
              --predicate-type "https://spdx.dev/Document/v2.3"; then
              exit 0
            fi

            sleep $((attempt * 3))
          done

          exit 1

  release-publish:
    name: release-publish
    needs:
      - release-build
      - release-attest
    runs-on: ubuntu-latest
    permissions:
      actions: read # Download staged workflow artifacts before publication.
      contents: write # Create and update the GitHub release with generated artifacts.
    steps:
      - name: Download staged release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          release_exists=false
          release_is_draft=false
          mapfile -t files < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)

          cat >"$notes_file" <<EOF
          Automated public release artifact.

          Files:
          EOF

          for file in "${files[@]}"; do
            printf -- '          - %s\n' "$file" >>"$notes_file"
          done

          if gh release view "$tag" --json isDraft >/dev/null 2>&1; then
            release_exists=true
            release_is_draft="$(gh release view "$tag" --json isDraft -q '.isDraft')"
          fi

          if [[ "${release_exists}" != true ]]; then
            gh release create "$tag" --title "resetusb ${tag}" --notes-file "$notes_file" --draft
            release_is_draft=true
          fi

          gh release upload "$tag" dist/* --clobber

          if [[ "${release_is_draft}" == "true" ]]; then
            gh release edit "$tag" --draft=false
          fi
