name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Signed semver tag to rebuild or publish with the builder workflow
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ inputs.release_tag || github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release-context:
    name: release-context
    runs-on: ubuntu-latest
    outputs:
      builder_sha: ${{ steps.resolve.outputs.builder_sha }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      verify_source_ref: ${{ steps.resolve.outputs.verify_source_ref }}
    steps:
      - id: resolve
        name: Resolve trusted release inputs
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          semver_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          if [[ "${REF_TYPE}" != "branch" || "${REF_NAME}" != "main" ]]; then
            echo "Trusted release runs must be dispatched from main" >&2
            exit 1
          fi

          release_tag="${INPUT_RELEASE_TAG}"
          verify_source_ref=""

          if [[ ! "${release_tag}" =~ ${semver_regex} ]]; then
            echo "Release runs require a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          builder_sha="${WORKFLOW_SHA}"
          if [[ ! "${builder_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve the pinned builder SHA from the trusted main workflow" >&2
            exit 1
          fi

          printf 'builder_sha=%s\n' "${builder_sha}" >> "${GITHUB_OUTPUT}"
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"
          printf 'source_ref=refs/tags/%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"
          printf 'verify_source_ref=%s\n' "${verify_source_ref}" >> "${GITHUB_OUTPUT}"

  release-preflight:
    name: release-preflight
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read # Check out builder inputs and tagged release source.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-context.outputs.builder_sha }}
          fetch-depth: 0
          path: builder
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-context.outputs.source_ref }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Validate semver release tag
        env:
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release runs require a signed semver tag in the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
      - name: Verify signed release tag before preflight
        env:
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
          RELEASE_SIGNING_KEY_FPR: 90554248C4F7CC086BB745D0DA5A8E9F536C42FD
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          trap 'rm -rf "$GNUPGHOME"' EXIT

          actual_fpr="$(
            gpg --batch --with-colons --show-keys builder/.github/keys/release-signing-key.asc |
              awk -F: '/^fpr:/ {print $10; exit}'
          )"

          if [[ "${actual_fpr}" != "${RELEASE_SIGNING_KEY_FPR}" ]]; then
            echo "Unexpected release signing key fingerprint: ${actual_fpr}" >&2
            exit 1
          fi

          gpg --batch --import builder/.github/keys/release-signing-key.asc
          printf '%s:6:\n' "${RELEASE_SIGNING_KEY_FPR}" | \
            gpg --batch --import-ownertrust

          git -C source rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}" >/dev/null
          git -C source -c gpg.program=gpg verify-tag "${RELEASE_TAG}"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Run release preflight
        env:
          GITHUB_REF_NAME: ${{ needs.release-context.outputs.release_tag }}
          GITHUB_REF_TYPE: tag
        run: |
          set -euo pipefail

          BUILDER_ROOT="$PWD/builder" \
          SOURCE_ROOT="$PWD/source" \
          WORK_ROOT="$PWD/source" \
          DIST_DIR="$PWD/source/dist" \
          ./builder/scripts/release-preflight.sh

  release-build:
    name: release-build
    needs:
      - release-context
      - release-preflight
    permissions:
      actions: read # Allow the reusable workflow to download staged artifacts for attestation.
      artifact-metadata: write # Persist subject metadata for builder attestations.
      attestations: write # Publish GitHub attestations from the builder workflow.
      contents: read # Check out builder inputs and tagged release source.
      id-token: write # Mint OIDC identities for Sigstore and GitHub attestations.
    uses: ./.github/workflows/release-builder.yml
    with:
      builder_sha: ${{ needs.release-context.outputs.builder_sha }}
      release_tag: ${{ needs.release-context.outputs.release_tag }}
      source_ref: ${{ needs.release-context.outputs.source_ref }}
      verify_source_ref: ${{ needs.release-context.outputs.verify_source_ref }}

  release-publish:
    name: release-publish
    needs:
      - release-context
      - release-build
    runs-on: ubuntu-latest
    permissions:
      actions: read # Download staged workflow artifacts before publication.
      contents: write # Create and update the GitHub release with generated artifacts.
    steps:
      - name: Download staged release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Verify staged artifacts against the builder workflow
        env:
          GH_TOKEN: ${{ github.token }}
          PRIMARY_ARTIFACTS_JSON: ${{ needs.release-build.outputs.primary_artifacts }}
          VERIFY_SOURCE_REF: ${{ needs.release-context.outputs.verify_source_ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess

          artifacts = json.loads(os.environ["PRIMARY_ARTIFACTS_JSON"])
          if not artifacts:
              raise SystemExit("no primary artifacts were staged for publication")

          verify_source_ref = os.environ["VERIFY_SOURCE_REF"]
          signer_workflow = f'{os.environ["GITHUB_REPOSITORY"]}/.github/workflows/release-builder.yml'

          for artifact in artifacts:
              artifact_path = f"dist/{artifact}"
              if not os.path.isfile(artifact_path):
                  raise SystemExit(f"missing staged artifact: {artifact_path}")

              base_cmd = [
                  "gh",
                  "attestation",
                  "verify",
                  artifact_path,
                  "--repo",
                  os.environ["GITHUB_REPOSITORY"],
                  "--signer-workflow",
                  signer_workflow,
              ]
              if verify_source_ref:
                  base_cmd.extend(["--source-ref", verify_source_ref])

              subprocess.run(base_cmd, check=True)
              subprocess.run(
                  base_cmd + ["--predicate-type", "https://spdx.dev/Document/v2.3"],
                  check=True,
              )
          PY
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          notes_file="$(mktemp)"
          release_exists=false
          release_is_draft=false
          mapfile -t files < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)

          cat >"$notes_file" <<EOF
          Automated public release artifact built by the dedicated GitHub builder workflow.

          Source tag: ${tag}

          Files:
          EOF

          for file in "${files[@]}"; do
            printf -- '          - %s\n' "$file" >>"$notes_file"
          done

          if gh release view "$tag" --repo "${REPOSITORY}" --json isDraft >/dev/null 2>&1; then
            release_exists=true
            release_is_draft="$(gh release view "$tag" --repo "${REPOSITORY}" --json isDraft -q '.isDraft')"
          fi

          if [[ "${release_exists}" != true ]]; then
            gh release create "$tag" --repo "${REPOSITORY}" --title "resetusb ${tag}" --notes-file "$notes_file" --draft
            release_is_draft=true
          fi

          gh release upload "$tag" dist/* --repo "${REPOSITORY}" --clobber

          if [[ "${release_is_draft}" == "true" ]]; then
            gh release edit "$tag" --repo "${REPOSITORY}" --draft=false
          fi
