name: Scorecard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 1 * * 6"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analysis:
    name: scorecard-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read # Check out repository contents for Scorecard analysis.
      security-events: write # Upload the generated SARIF results to code scanning.
      id-token: write # Publish Scorecard results with OIDC-backed identity.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@c6f931105cb2c34c8f901cc885ba1e2e259cf745 # v4.34.0
        with:
          sarif_file: results.sarif
