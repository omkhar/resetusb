---
name: OSV Scanner

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read # Required for workflow artifact uploads.
      contents: read # Required to check out the repository contents for scanning.
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Check out pull request base
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git checkout "$GITHUB_BASE_REF"

      - name: Scan pull request base
        if: ${{ github.event_name == 'pull_request' }}
        uses: google/osv-scanner-action/osv-scanner-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            -r
            ./

      - name: Check out pull request head
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git checkout -f "$GITHUB_SHA"

      - name: Scan pull request head
        if: ${{ github.event_name == 'pull_request' }}
        uses: google/osv-scanner-action/osv-scanner-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            -r
            ./

      - name: Report pull request vulnerabilities
        if: ${{ github.event_name == 'pull_request' }}
        uses: google/osv-scanner-action/osv-reporter-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        with:
          scan-args: |-
            --output=results.sarif
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=true

      - name: Scan repository
        if: ${{ github.event_name != 'pull_request' }}
        uses: google/osv-scanner-action/osv-scanner-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=results.json
            -r
            ./

      - name: Report repository vulnerabilities
        if: ${{ github.event_name != 'pull_request' }}
        uses: google/osv-scanner-action/osv-reporter-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=false

      - name: Upload OSV SARIF artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: OSV Scanner SARIF file
          path: results.sarif
          retention-days: 5
