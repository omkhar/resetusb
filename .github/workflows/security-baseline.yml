name: Security Baseline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.7"
          check-latest: true

      - name: Install gitleaks
        run: GOTOOLCHAIN=auto go install github.com/zricethezav/gitleaks/v8@v8.30.0

      - name: Scan repository for hardcoded secrets
        run: |
          "$(go env GOPATH)/bin/gitleaks" dir . --no-banner --redact --exit-code 1
