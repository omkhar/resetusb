name: Security Baseline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.25.7"
          check-latest: true

      - name: Install gitleaks
        run: GOTOOLCHAIN=auto go install github.com/zricethezav/gitleaks/v8@v8.30.0

      - name: Scan repository for hardcoded secrets
        run: |
          "$(go env GOPATH)/bin/gitleaks" dir . --no-banner --redact --exit-code 1

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3

  codeql:
    name: codeql (${{ matrix.language }})
    # resetusb currently uses GitHub CodeQL default setup. Keep advanced setup opt-in
    # to avoid SARIF processing conflicts between default and advanced modes.
    if: vars.ENABLE_CODEQL_ADVANCED == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Install native build dependencies for C/C++ analysis
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          category: "/language:${{ matrix.language }}"
