name: Security Baseline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.7"
          check-latest: true
          cache: false

      - name: Install gitleaks
        run: GOTOOLCHAIN=auto go install github.com/zricethezav/gitleaks/v8@v8.30.0

      - name: Decide scan scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "mode=history" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -n "${BASE_SHA}" && "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            echo "mode=range" >> "${GITHUB_OUTPUT}"
            echo "range=${BASE_SHA}..${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "mode=history" >> "${GITHUB_OUTPUT}"

      - name: Scan new commits for hardcoded secrets
        if: steps.scope.outputs.mode == 'range'
        run: |
          "$(go env GOPATH)/bin/gitleaks" git . \
            --log-opts="${{ steps.scope.outputs.range }}" \
            --no-banner \
            --redact \
            --exit-code 1

      - name: Scan reachable Git history for hardcoded secrets
        if: steps.scope.outputs.mode == 'history'
        run: |
          "$(go env GOPATH)/bin/gitleaks" git . \
            --log-opts="--all" \
            --no-banner \
            --redact \
            --exit-code 1
