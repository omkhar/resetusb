name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 128M

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install security tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang-format clang-tools cppcheck libusb-1.0-0-dev shellcheck
      - name: Lint and format checks
        run: |
          make lint
          make check-format
      - name: Clang static analyzer
        run: scan-build --status-bugs --keep-empty --exclude /usr/include make clean all test

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Restore compiler cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'resetusb.h', 'tests/resetusb_unit_tests.c', 'Makefile', '.clang-format') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Build
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc"
          ccache --show-stats || true

  ci-test:
    name: ci-test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Restore compiler cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'resetusb.h', 'tests/resetusb_unit_tests.c', 'Makefile', '.clang-format') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Run unit tests and verify binary exists
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc" test
          test -x ./resetusb
          ccache --show-stats || true

  ci-sanitize:
    name: ci-sanitize
    needs: ci-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev
      - name: Run address/undefined sanitizers
        run: make sanitize CC=gcc
