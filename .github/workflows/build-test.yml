name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEBIAN_BASE_IMAGE: debian:trixie@sha256:55a15a112b42be10bfc8092fcc40b6748dc236f7ef46a358d9392b339e9d60e8
  DEBIAN_SNAPSHOT_URL: http://snapshot.debian.org/archive/debian
  DEBIAN_SNAPSHOT_TIMESTAMP: 20260317T082636Z
  DEBIAN_SUITE: trixie

jobs:
  detect-package-changes:
    name: detect-package-changes
    runs-on: ubuntu-latest
    outputs:
      package_smoke: ${{ steps.filter.outputs.package_smoke }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Decide whether package smoke tests should run
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "package_smoke=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            echo "package_smoke=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          package_smoke=false
          while IFS= read -r path; do
            case "${path}" in
              LICENSE|Makefile|README.md|docker/*|release-manifest.schema.json|resetusb.8|scripts/build-release-artifacts.sh|scripts/docker-build-release-builder.sh|scripts/install-ci-deps.sh|scripts/release-preflight.sh|scripts/test-package-integration.sh|scripts/validate-release-manifest.py|scripts/verify-release-reproducibility.sh|.github/workflows/*)
                package_smoke=true
                break
                ;;
            esac
          done < <(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")

          echo "package_smoke=${package_smoke}" >> "${GITHUB_OUTPUT}"

  static-analysis:
    name: static-analysis
    runs-on: ubuntu-latest
    container:
      image: debian:trixie@sha256:55a15a112b42be10bfc8092fcc40b6748dc236f7ef46a358d9392b339e9d60e8
    steps:
      - name: Bootstrap pinned CI tooling
        run: |
          set -euo pipefail
          echo 'Acquire::Retries "6";' > /etc/apt/apt.conf.d/80-retries
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/90snapshot
          rm -f /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          printf 'deb [check-valid-until=no] %s/%s/ %s main\n' \
            "${DEBIAN_SNAPSHOT_URL}" "${DEBIAN_SNAPSHOT_TIMESTAMP}" "${DEBIAN_SUITE}" \
            > /etc/apt/sources.list.d/snapshot.list
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify CI snapshot lock matches the release builder lock
        run: |
          set -euo pipefail
          expected_base_image="${DEBIAN_BASE_IMAGE}"
          expected_snapshot_url="${DEBIAN_SNAPSHOT_URL}"
          expected_snapshot_timestamp="${DEBIAN_SNAPSHOT_TIMESTAMP}"
          expected_suite="${DEBIAN_SUITE}"
          # shellcheck disable=SC1091
          source ./docker/release-builder.lock

          [[ "${DEBIAN_BASE_IMAGE}" == "${expected_base_image}" ]]
          [[ "${DEBIAN_SNAPSHOT_URL}" == "${expected_snapshot_url}" ]]
          [[ "${DEBIAN_SNAPSHOT_TIMESTAMP}" == "${expected_snapshot_timestamp}" ]]
          [[ "${DEBIAN_SUITE}" == "${expected_suite}" ]]
      - name: Install static analysis tooling
        run: |
          ./scripts/install-ci-deps.sh static-analysis
      - name: Run lint, format, and clang static analysis
        run: |
          make lint
          make check-format
          scan-build --status-bugs --keep-empty --exclude /usr/include make clean all test

  unit-tests:
    name: unit-tests (${{ matrix.cc }})
    runs-on: ubuntu-latest
    container:
      image: debian:trixie@sha256:55a15a112b42be10bfc8092fcc40b6748dc236f7ef46a358d9392b339e9d60e8
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - name: Bootstrap pinned CI tooling
        run: |
          set -euo pipefail
          echo 'Acquire::Retries "6";' > /etc/apt/apt.conf.d/80-retries
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/90snapshot
          rm -f /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          printf 'deb [check-valid-until=no] %s/%s/ %s main\n' \
            "${DEBIAN_SNAPSHOT_URL}" "${DEBIAN_SNAPSHOT_TIMESTAMP}" "${DEBIAN_SUITE}" \
            > /etc/apt/sources.list.d/snapshot.list
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify CI snapshot lock matches the release builder lock
        run: |
          set -euo pipefail
          expected_base_image="${DEBIAN_BASE_IMAGE}"
          expected_snapshot_url="${DEBIAN_SNAPSHOT_URL}"
          expected_snapshot_timestamp="${DEBIAN_SNAPSHOT_TIMESTAMP}"
          expected_suite="${DEBIAN_SUITE}"
          # shellcheck disable=SC1091
          source ./docker/release-builder.lock

          [[ "${DEBIAN_BASE_IMAGE}" == "${expected_base_image}" ]]
          [[ "${DEBIAN_SNAPSHOT_URL}" == "${expected_snapshot_url}" ]]
          [[ "${DEBIAN_SNAPSHOT_TIMESTAMP}" == "${expected_snapshot_timestamp}" ]]
          [[ "${DEBIAN_SUITE}" == "${expected_suite}" ]]
      - name: Install compiler and build dependencies
        run: |
          ./scripts/install-ci-deps.sh unit-tests
      - name: Build and run unit tests
        env:
          MATRIX_CC: ${{ matrix.cc }}
        run: |
          set -euo pipefail

          case "${MATRIX_CC}" in
            gcc|clang) ;;
            *)
              echo "Unsupported compiler: ${MATRIX_CC}" >&2
              exit 1
              ;;
          esac

          make clean
          make CC="${MATRIX_CC}" test

  sanitize:
    name: sanitize
    runs-on: ubuntu-latest
    container:
      image: debian:trixie@sha256:55a15a112b42be10bfc8092fcc40b6748dc236f7ef46a358d9392b339e9d60e8
    steps:
      - name: Bootstrap pinned CI tooling
        run: |
          set -euo pipefail
          echo 'Acquire::Retries "6";' > /etc/apt/apt.conf.d/80-retries
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/90snapshot
          rm -f /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          printf 'deb [check-valid-until=no] %s/%s/ %s main\n' \
            "${DEBIAN_SNAPSHOT_URL}" "${DEBIAN_SNAPSHOT_TIMESTAMP}" "${DEBIAN_SUITE}" \
            > /etc/apt/sources.list.d/snapshot.list
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify CI snapshot lock matches the release builder lock
        run: |
          set -euo pipefail
          expected_base_image="${DEBIAN_BASE_IMAGE}"
          expected_snapshot_url="${DEBIAN_SNAPSHOT_URL}"
          expected_snapshot_timestamp="${DEBIAN_SNAPSHOT_TIMESTAMP}"
          expected_suite="${DEBIAN_SUITE}"
          # shellcheck disable=SC1091
          source ./docker/release-builder.lock

          [[ "${DEBIAN_BASE_IMAGE}" == "${expected_base_image}" ]]
          [[ "${DEBIAN_SNAPSHOT_URL}" == "${expected_snapshot_url}" ]]
          [[ "${DEBIAN_SNAPSHOT_TIMESTAMP}" == "${expected_snapshot_timestamp}" ]]
          [[ "${DEBIAN_SUITE}" == "${expected_suite}" ]]
      - name: Install sanitizer dependencies
        run: |
          ./scripts/install-ci-deps.sh sanitize
      - name: Run address and undefined behavior sanitizers
        run: |
          make clean
          make sanitize CC=gcc

  package-smoke:
    name: package-smoke
    needs: detect-package-changes
    if: needs.detect-package-changes.outputs.package_smoke == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Build release builder image
        run: ./scripts/docker-build-release-builder.sh --platform=linux/amd64 -f docker/release-builder.Dockerfile -t "resetusb-release-builder:${GITHUB_SHA}" .
      - name: Build release artifacts
        run: |
          docker run --rm --platform=linux/amd64 \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e GITHUB_REF_TYPE="${GITHUB_REF_TYPE}" \
            -e SOURCE_ROOT=/work \
            -e DIST_DIR=/work/dist \
            -v "$PWD":/work \
            -w /work \
            "resetusb-release-builder:${GITHUB_SHA}" \
            bash -lc './scripts/build-release-artifacts.sh'
      - name: Verify release artifacts are reproducible
        env:
          BUILDER_IMAGE: resetusb-release-builder:${{ github.sha }}
        run: |
          GITHUB_SHA="${GITHUB_SHA}" \
          GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
          GITHUB_REF_TYPE="${GITHUB_REF_TYPE}" \
          SOURCE_ROOT="$PWD" \
          DIST_DIR="$PWD/dist" \
          BUILDER_IMAGE="${BUILDER_IMAGE}" \
          ./scripts/verify-release-reproducibility.sh
      - name: Run package smoke tests
        run: |
          ./scripts/test-package-integration.sh
