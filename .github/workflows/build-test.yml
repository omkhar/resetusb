name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 128M

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install security tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang-format clang-tools cppcheck libusb-1.0-0-dev shellcheck
      - name: Lint and format checks
        run: |
          make lint
          make check-format
      - name: Clang static analyzer
        run: scan-build --status-bugs --keep-empty --exclude /usr/include make clean all test

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Restore compiler cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'resetusb.h', 'tests/resetusb_unit_tests.c', 'Makefile', '.clang-format') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Build
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc"
          ccache --show-stats || true

  ci-test:
    name: ci-test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Restore compiler cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'resetusb.h', 'tests/resetusb_unit_tests.c', 'Makefile', '.clang-format') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Run unit tests and verify binary exists
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc" test
          test -x ./resetusb
          ccache --show-stats || true

  ci-sanitize:
    name: ci-sanitize
    needs: ci-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev
      - name: Run address/undefined sanitizers
        run: make sanitize CC=gcc

  ci-package-integration:
    name: ci-package-integration
    needs: ci-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Build release builder image
        run: docker build --platform=linux/amd64 -f docker/release-builder.Dockerfile -t "resetusb-release-builder:${GITHUB_SHA}" .
      - name: Build release artifacts
        run: |
          docker run --rm --platform=linux/amd64 \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e GITHUB_REF_TYPE="${GITHUB_REF_TYPE}" \
            -v "$PWD":/work \
            -w /work \
            "resetusb-release-builder:${GITHUB_SHA}" \
            bash -lc './scripts/build-release-artifacts.sh'
      - name: Run stable and unstable package integration tests
        run: ./scripts/test-package-integration.sh
