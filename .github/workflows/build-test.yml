name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 128M

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install security tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang-tools cppcheck libusb-1.0-0-dev shellcheck
      - name: Static analysis and script linting
        run: |
          cppcheck --enable=warning,style,performance,portability --error-exitcode=1 --suppress=missingIncludeSystem resetusb.c
          shellcheck scripts/*.sh
      - name: Clang static analyzer
        run: scan-build --status-bugs --keep-empty --exclude /usr/include make clean all test

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'Makefile') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Build
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc"
          ccache --show-stats || true

  ci-test:
    name: ci-test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'Makefile') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Run unit tests and verify binary exists
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc" test
          test -x ./resetusb
          ccache --show-stats || true
