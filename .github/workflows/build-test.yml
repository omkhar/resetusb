name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 128M

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install security tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
      - name: Static analysis
        run: cppcheck --enable=warning,style --error-exitcode=1 resetusb.c

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'Makefile') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Build
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc"
          ccache --show-stats || true

  ci-test:
    name: ci-test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: resetusb-ccache-${{ runner.os }}-${{ hashFiles('resetusb.c', 'Makefile') }}
          restore-keys: |
            resetusb-ccache-${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev ccache
      - name: Run unit tests and verify binary exists
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats || true
          make CC="ccache gcc" test
          test -x ./resetusb
          ccache --show-stats || true

  deploy-staging:
    name: deploy-staging
    needs: ci-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, hil]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev
      - name: Build for HIL lane
        run: make

  staging-smoke:
    name: staging-smoke
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'
    runs-on: [self-hosted, linux, hil]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev
      - name: Run HIL smoke
        run: scripts/staging_smoke.sh

  deploy-production:
    name: deploy-production
    needs:
      - ci-security
      - ci-build
      - ci-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify required checks by SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/ci_wait_for_checks.sh "${{ github.event.pull_request.head.sha || github.sha }}" 30 "ci-build,ci-test,ci-security"
      - name: Production deploy placeholder
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "HIL deploy gate passed; no automated production action defined for resetusb."
          else
            echo "Not a main push; production deployment skipped."
          fi
