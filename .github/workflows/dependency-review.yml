name: Dependency Review

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # Read pull request metadata for dependency review analysis.

jobs:
  dependency-review:
    name: dependency-review
    if: github.repository_visibility == 'public' || vars.ENABLE_PRIVATE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
