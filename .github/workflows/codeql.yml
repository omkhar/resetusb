name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  DEBIAN_BASE_IMAGE: debian:trixie@sha256:55a15a112b42be10bfc8092fcc40b6748dc236f7ef46a358d9392b339e9d60e8
  DEBIAN_SNAPSHOT_URL: https://snapshot.debian.org/archive/debian
  DEBIAN_SNAPSHOT_TIMESTAMP: 20260317T082636Z
  DEBIAN_SUITE: trixie

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    container:
      image: debian:trixie@sha256:55a15a112b42be10bfc8092fcc40b6748dc236f7ef46a358d9392b339e9d60e8
    permissions:
      actions: read # Resolve workflow metadata when analyzing GitHub Actions definitions.
      contents: read # Check out repository contents for CodeQL analysis.
      security-events: write # Upload CodeQL SARIF results to code scanning.
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Bootstrap pinned CI tooling
        run: |
          set -euo pipefail
          echo 'Acquire::Retries "6";' > /etc/apt/apt.conf.d/80-retries
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/90snapshot
          rm -f /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          printf 'deb [check-valid-until=no] %s/%s/ %s main\n' \
            "${DEBIAN_SNAPSHOT_URL}" "${DEBIAN_SNAPSHOT_TIMESTAMP}" "${DEBIAN_SUITE}" \
            > /etc/apt/sources.list.d/snapshot.list
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Verify CI snapshot lock matches the release builder lock
        run: |
          set -euo pipefail
          expected_base_image="${DEBIAN_BASE_IMAGE}"
          expected_snapshot_url="${DEBIAN_SNAPSHOT_URL}"
          expected_snapshot_timestamp="${DEBIAN_SNAPSHOT_TIMESTAMP}"
          expected_suite="${DEBIAN_SUITE}"
          # shellcheck disable=SC1091
          source ./docker/release-builder.lock

          [[ "${DEBIAN_BASE_IMAGE}" == "${expected_base_image}" ]]
          [[ "${DEBIAN_SNAPSHOT_URL}" == "${expected_snapshot_url}" ]]
          [[ "${DEBIAN_SNAPSHOT_TIMESTAMP}" == "${expected_snapshot_timestamp}" ]]
          [[ "${DEBIAN_SUITE}" == "${expected_suite}" ]]

      - name: Install C/C++ dependencies
        if: matrix.language == 'c-cpp'
        run: ./scripts/install-ci-deps.sh codeql-c-cpp

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c6f931105cb2c34c8f901cc885ba1e2e259cf745 # v4.34.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config: |
            threat-models: local

      - name: Build for CodeQL
        if: matrix.language == 'c-cpp'
        run: |
          make clean
          make CC=gcc
          make CC=gcc test

      - name: Analyze
        uses: github/codeql-action/analyze@c6f931105cb2c34c8f901cc885ba1e2e259cf745 # v4.34.0
        with:
          category: "/language:${{ matrix.language }}"
